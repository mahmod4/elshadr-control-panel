# ========================================
# Netlify Configuration
# ========================================
# Purpose: إعدادات نشر المشروع على Netlify
# Usage: يحدد كيفية بناء ونشر الموقع والـ Functions
# Features: نشر static site، functions، redirects، headers

[build]
  publish = "."           # مجلد المصدر للملفات الثابتة
  functions = "netlify/functions"  # مجلد الـ Functions

[[headers]]
  for = "/js/cloudinary-config.js"
  [headers.values]
    Cache-Control = "no-store"

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
